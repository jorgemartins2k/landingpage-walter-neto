<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Walter Neto | Linktree</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #302b63;
            margin: 0 auto 1.5rem;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(48, 43, 99, 0.5);
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.4);
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.6);
        }

        .btn-site {
            background-color: transparent;
            border: 2px solid rgba(255, 255, 255, 0.8);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-site:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .seal-container img {
            height: 40px;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .seal-container img:hover {
            opacity: 1;
        }

        .name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 0.9rem;
            color: #d1d1d1;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        footer {
            margin-top: auto;
            padding-top: 2rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="glass-card">
        <img src="assets/walter-avatar-linktree.webp" alt="Dr. Walter Neto" class="avatar">

        <h1 class="name">Dr. Walter Neto</h1>
        <p class="description">
            Advogado Criminalista | Direito Criminal e Processo Penal<br>
            Atendimento em todo o Brasil
        </p>

        <div class="seal-container flex justify-center gap-4 mb-8">
            <!-- Selos placeholders (já que a pasta estava vazia, usarei SVGs genéricos de balança e OAB) -->
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
                <path
                    d="M16 16c3.314 0 6-2 6-4.5S19.314 7 16 7c-1.332 0-2.551.321-3.535.862a4 4 0 1 0-4.93 0C6.551 7.32 5.332 7 4 7 0.686 7-2 9-2 11.5s2.686 4.5 6 4.5m8 0c0 2.485-2.686 4.5-6 4.5s-6-2.015-6-4.5m12 0c0-2-1-3.5-2.5-4m-7 0C5 12.5 4 14 4 16" />
            </svg>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
                <circle cx="12" cy="12" r="10" />
                <path d="m16 10-4 4-4-4" />
            </svg>
        </div>

        <div class="flex flex-col gap-4">
            <a href="https://wa.me/5564992597117" target="_blank"
                class="block w-full py-4 px-6 rounded-xl font-bold btn-whatsapp flex items-center justify-center gap-2">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.067 2.877 1.215 3.076.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
                </svg>
                Fale agora com o Dr. Walter Neto
            </a>

            <a href="landing-page.html"
                class="block w-full py-4 px-6 rounded-xl font-bold btn-site flex items-center justify-center gap-2">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Conheça nosso escritório
            </a>
        </div>
    </div>

    <footer>
        <p>© 2025 Dr. Walter Neto | Advogado Criminalista</p>
    </footer>
</body>

</html>
