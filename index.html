<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Walter Neto | Advogado Criminalista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --accent-gold: #c5a059;
            --accent-gold-light: #dfbd80;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(197, 160, 89, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(at 0% 0%, #1a1c2c 0px, transparent 50%),
                radial-gradient(at 100% 100%, #302b11 0px, transparent 50%);
            opacity: 0.4;
            filter: blur(80px);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 2.5rem 1.5rem;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            margin: 0 auto 1.5rem;
            object-fit: cover;
            padding: 4px;
            background: rgba(197, 160, 89, 0.1);
            animation: pulse-gold 3s infinite;
        }

        @keyframes pulse-gold {
            0% {
                box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(197, 160, 89, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(197, 160, 89, 0);
            }
        }

        .name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, var(--accent-gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: #a1a1aa;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .btn-premium {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 1.1rem;
            border-radius: 1rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 1rem;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #a67c3b 100%);
            color: #000;
            box-shadow: 0 10px 20px -5px rgba(197, 160, 89, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -10px rgba(197, 160, 89, 0.5);
            background: linear-gradient(135deg, var(--accent-gold-light) 0%, var(--accent-gold) 100%);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: #fff;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-gold);
            transform: translateY(-3px);
        }

        .seals {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            opacity: 0.6;
        }

        .seals svg {
            width: 32px;
            height: 32px;
            color: var(--accent-gold);
        }

        .footer-text {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.75rem;
            color: #4b4b4b;
        }
    </style>
</head>

<body>
    <div class="mesh-bg"></div>

    <div class="glass-card">
        <img src="assets/walter-avatar.webp" alt="Dr. Walter Neto" class="avatar">

        <h1 class="name">Dr. Walter Neto</h1>
        <p class="tagline">
            Especialista em Direito Criminal e Processo Penal<br>
            Professor Universitário | Atendimento Nacional
        </p>

        <div class="buttons">

                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">

            <!-- Badge icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path
                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
            </svg>
            <!-- Verification icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M9 11l3 3L22 4" />
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
            </svg>
        </div>
    </div>

    <div class="footer-text">© 2025 Dr. Walter Neto | Advogado Criminalista</div>
</body>

</html>
